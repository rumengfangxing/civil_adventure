modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''
logoFile="logo.png"
mixinConfigs = ["${mod_id}.mixins.json"]

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# ── 强制前置：Civil（文礼）───────────────────────────────────
# 本模组是 Civil 附属模组，定义与文明区相对的「冒险区」。
# 必须同时安装 Civil ≥ 2.0.0。
[[dependencies.${mod_id}]]
    modId="civil"
    mandatory=true
    versionRange="[2.0.0,)"
    ordering="AFTER"
    side="BOTH"
